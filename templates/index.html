<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio IsraProyets</title>
<link rel="icon" href="/templates/Icono/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#6366f1;
    --secondary:#ec4899;
    --glass:rgba(255,255,255,0.15);
    --text:#ffffff;
    --dark:#0f172a;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:var(--text);
    overflow:hidden;
}

.player{
    backdrop-filter:blur(20px);
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:24px;
    padding:40px 30px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

.logo{
    width:70px;
    margin-bottom:15px;
    border-radius:50%;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h1{
    font-size:22px;
    font-weight:700;
    margin-bottom:25px;
}

label{
    font-size:14px;
    opacity:0.9;
}

select{
    margin-top:10px;
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:14px;
    background:rgba(255,255,255,0.9);
    transition:all 0.3s ease;
}

select:hover{
    transform:scale(1.02);
}

.audio-wrapper{
    margin-top:25px;
}

audio{
    width:100%;
    border-radius:12px;
}

.status{
    margin-top:15px;
    font-size:13px;
    opacity:0.8;
}

.footer{
    margin-top:25px;
    font-size:12px;
    opacity:0.6;
}

@media(max-width:480px){
    .player{
        padding:30px 20px;
        border-radius:18px;
    }
}
</style>
</head>

<body>

<div class="player">
    <img src="/templates/Png/Israel.png" alt="Logo Radio" class="logo">
    <h1>Radio IsraProyets</h1>

    <label for="song-list">Selecciona una canción</label>
    <select id="song-list">
        {% for song in song_names %}
        <option value="{{ song }}">{{ song }}</option>
        {% endfor %}
    </select>

    <div class="audio-wrapper">
        <audio id="audio-player" controls autoplay>
            <source src="/stream" type="audio/mpeg">
        </audio>
    </div>

    <div class="status" id="status">Reproduciendo en vivo</div>

    <div class="footer">
        Powered by IsraProyets
    </div>
</div>

<script>
const select = document.getElementById('song-list')
const audio = document.getElementById('audio-player')
const statusText = document.getElementById('status')

select.addEventListener('change', () => {
    const song = encodeURIComponent(select.value)
    audio.src = `/stream?song=${song}`
    audio.load()
    audio.play()
    statusText.textContent = `Reproduciendo: ${select.value}`
})

audio.addEventListener('play', () => {
    statusText.textContent = `Reproduciendo: ${select.value || "En vivo"}`
})

audio.addEventListener('pause', () => {
    statusText.textContent = "Pausado"
})
</script>

</body>
</html>
