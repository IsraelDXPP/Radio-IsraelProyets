<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio IsraProyets</title>
<link rel="icon" href="/static/Icono/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

[data-theme="dark"]{
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --surface3:#22223a;
    --border:#2a2a3a; --text:#e8e8f0; --text2:#8888a0; --text3:#55557a;
    --accent:#7c3aed; --accent2:#a855f7; --accent-glow:rgba(124,58,237,.3);
    --green:#22c55e; --red:#ef4444; --yellow:#eab308; --orange:#f97316;
    --logo-border:rgba(255,255,255,.15); --card-bg:rgba(18,18,26,.75);
    --shadow:rgba(0,0,0,.5); --glow-opacity:.12; --modal-overlay:rgba(0,0,0,.6);
}
[data-theme="light"]{
    --bg:#f1f5f9; --surface:#ffffff; --surface2:#e2e8f0; --surface3:#cbd5e1;
    --border:#cbd5e1; --text:#0f172a; --text2:#475569; --text3:#94a3b8;
    --accent:#7c3aed; --accent2:#a855f7; --accent-glow:rgba(124,58,237,.15);
    --green:#16a34a; --red:#dc2626; --yellow:#ca8a04; --orange:#ea580c;
    --logo-border:rgba(0,0,0,.1); --card-bg:rgba(255,255,255,.8);
    --shadow:rgba(0,0,0,.1); --glow-opacity:.06; --modal-overlay:rgba(0,0,0,.3);
}

body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden; transition:background .4s,color .4s;
}

.bg-glow{
    position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg-glow::before,.bg-glow::after{
    content:'';position:absolute;
    width:60vw;height:60vw;border-radius:50%;
    filter:blur(120px);opacity:var(--glow-opacity);
    animation:drift 20s ease-in-out infinite;
    transition:background .6s;
}
.bg-glow::before{background:var(--gc1,#7c3aed);top:-20%;left:-10%}
.bg-glow::after{background:var(--gc2,#a855f7);bottom:-20%;right:-10%;animation-delay:-10s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,5%) scale(1.1)}66%{transform:translate(-3%,-3%) scale(.95)}}

.app{position:relative;z-index:1;width:100%;max-width:450px;padding:10px}

.card{
    background:var(--card-bg); backdrop-filter:blur(24px);
    border:1px solid var(--border); border-radius:14px;
    padding:18px 18px 16px; box-shadow:0 8px 40px var(--shadow);
    transition:background .4s,border-color .4s; max-height:98vh; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.card::-webkit-scrollbar{width:3px}
.card::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.header img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--logo-border)}
.header-info{flex:1;min-width:0}
.header-info h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-info p{font-size:10px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:4px}
.header-actions button{
    width:32px;height:32px;border-radius:8px;background:var(--surface2);
    border:1px solid var(--border);color:var(--text2);font-size:14px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.header-actions button:hover{background:var(--surface3);color:var(--text)}

/* Visualizer */
.visualizer{width:100%;height:48px;border-radius:8px;background:var(--surface);margin-bottom:10px;overflow:hidden}
.visualizer canvas{width:100%;height:100%;display:block}

/* Now playing */
.now-playing{text-align:center;margin-bottom:12px;min-height:40px}
.now-playing .title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-playing .artist{font-size:11px;color:var(--text2);margin-top:2px}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.controls button{
    width:36px;height:36px;border-radius:50%;background:var(--surface2);
    border:1px solid var(--border);color:var(--text);font-size:15px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.controls button:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.05)}
.controls .btn-play{width:44px;height:44px;font-size:18px;background:var(--accent);border-color:var(--accent);box-shadow:0 4px 16px var(--accent-glow)}

/* Progress */
.progress-container{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.progress-container span{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;min-width:32px}
.progress-bar{flex:1;height:4px;border-radius:4px;background:var(--surface2);cursor:pointer;position:relative}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .1s linear}
.progress-fill::after{content:'';position:absolute;right:-5px;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--accent2);opacity:0;transition:opacity .2s}
.progress-bar:hover .progress-fill::after{opacity:1}

/* Volume */
.volume-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.volume-row .vol-icon{font-size:14px;color:var(--text2);min-width:18px;text-align:center;cursor:pointer;user-select:none}
.volume-row input[type="range"]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:3px;background:var(--surface2);outline:none;cursor:pointer}
.volume-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent2);cursor:pointer;border:2px solid var(--surface);transition:transform .15s}
.volume-row input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.2)}
.volume-row input[type="range"]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent2);cursor:pointer;border:2px solid var(--surface)}
.volume-row .vol-pct{font-size:10px;color:var(--text2);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}

/* Song list toggle */
.song-section{margin-bottom:0}
.song-toggle{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 0;cursor:pointer;user-select:none;border-radius:6px;transition:background .15s;
}
.song-toggle:hover{background:var(--surface2)}
.song-toggle h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.song-toggle .count{font-size:10px;font-weight:600;color:var(--accent2);background:rgba(124,58,237,.12);padding:2px 8px;border-radius:10px;font-variant-numeric:tabular-nums}
.song-toggle .arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.song-toggle.open .arrow{transform:rotate(180deg)}

.song-body{overflow:hidden;transition:max-height .3s ease;max-height:0}
.song-body.open{max-height:320px}

.search-box{
    width:100%;padding:8px 12px;border-radius:8px;background:var(--surface);
    border:1px solid var(--border);color:var(--text);font-size:12px;outline:none;
    margin:8px 0;font-family:inherit;transition:border-color .2s;
}
.search-box:focus{border-color:var(--accent)}

.song-list{list-style:none;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;border-radius:8px}
.song-list::-webkit-scrollbar{width:3px}
.song-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.song-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:all .12s;font-size:12px}
.song-item:hover{background:var(--surface2)}
.song-item.active{background:rgba(124,58,237,.15);color:var(--accent2)}
.song-item .num{font-size:10px;color:var(--text3);min-width:16px;text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
.song-item .info{flex:1;min-width:0}
.song-item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.song-item .meta{font-size:10px;color:var(--text3);margin-top:1px}
.song-item .tag{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.song-item .tag.yt{background:rgba(239,68,68,.15);color:var(--red)}
.song-item .tag.local{background:rgba(34,197,94,.15);color:var(--green)}
.song-item .tag.wait{background:rgba(250,204,21,.15);color:var(--yellow)}
.song-list-empty{text-align:center;padding:16px 0;font-size:12px;color:var(--text3)}

/* Download */
.download-area{padding-top:10px;margin-top:8px;border-top:1px solid var(--border)}
.download-row{display:flex;gap:6px}
.download-row input{flex:1;padding:8px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border-color .2s}
.download-row input:focus{border-color:var(--accent)}
.download-row button{padding:8px 14px;border-radius:8px;background:var(--accent);border:none;color:white;font-weight:600;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.download-row button:hover{background:var(--accent2)}
.download-row button:disabled{opacity:.5;cursor:not-allowed}
.download-tasks{list-style:none;margin-top:8px}
.download-task{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.download-task .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.download-task .dot.queued{background:var(--text3)}
.download-task .dot.downloading{background:var(--accent);animation:pulse 1s infinite}
.download-task .dot.converting{background:var(--yellow)}
.download-task .dot.done{background:var(--green)}
.download-task .dot.error{background:var(--red)}
.download-task .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.download-task .bar{width:50px;height:3px;border-radius:3px;background:var(--surface2);overflow:hidden}
.download-task .bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
.download-task .pct{font-size:10px;color:var(--text2);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}

/* Footer */
.footer{text-align:center;margin-top:12px;font-size:10px;color:var(--text3);line-height:1.5}
.footer a{color:var(--accent2);text-decoration:none}
.footer a:hover{text-decoration:underline}
.footer .sep{padding:0 4px;color:var(--border)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Settings Modal ─────────────────────────── */
.modal-overlay{
    position:fixed;inset:0;z-index:200;background:var(--modal-overlay);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:20px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.5);transform:translateY(20px);transition:transform .3s;
    scrollbar-width:thin;
}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h2{font-size:15px;font-weight:700;margin-bottom:16px}
.modal .close-btn{
    float:right;width:28px;height:28px;border-radius:6px;background:var(--surface2);
    border:1px solid var(--border);color:var(--text2);font-size:14px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal .close-btn:hover{background:var(--red);color:white;border-color:var(--red)}

.modal-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.modal-section h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

.setting-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;gap:10px}
.setting-row label{font-size:12px;font-weight:500;flex-shrink:0}
.setting-row .hint{font-size:10px;color:var(--text3);margin-top:2px}
.setting-row select,.setting-row input[type="text"]{
    padding:5px 8px;border-radius:6px;background:var(--surface2);
    border:1px solid var(--border);color:var(--text);font-size:11px;outline:none;font-family:inherit;max-width:160px;
}
.setting-row select:focus,.setting-row input:focus{border-color:var(--accent)}

/* Color picker in settings */
.color-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.color-group input[type="color"]{width:36px;height:30px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);cursor:pointer;padding:2px}
.color-group input[type="text"]{width:80px;padding:4px 6px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:10px;font-family:monospace}
.presets{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.presets button{width:24px;height:24px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .12s}
.presets button:hover{border-color:var(--text)}
.presets button.active{border-color:var(--accent2)}

/* Viz style buttons */
.viz-styles{display:flex;gap:6px;flex-wrap:wrap}
.viz-styles button{
    padding:5px 12px;border-radius:6px;background:var(--surface2);
    border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;
}
.viz-styles button:hover{background:var(--surface3)}
.viz-styles button.active{background:rgba(124,58,237,.15);color:var(--accent2);border-color:var(--accent)}

/* Toggle switch for settings */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{
    position:absolute;inset:0;cursor:pointer;background:var(--surface3);
    border-radius:20px;transition:.3s;
}
.toggle .slider::before{
    content:'';position:absolute;width:16px;height:16px;border-radius:50%;
    background:white;top:2px;left:2px;transition:.3s;
}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(16px)}

/* Duplicates section */
.dup-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:var(--surface2);margin-bottom:4px;font-size:11px}
.dup-item .dup-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dup-item .dup-badge{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:600}
.dup-item .dup-badge.sha{background:rgba(239,68,68,.15);color:var(--red)}
.dup-item .dup-badge.name{background:rgba(250,204,21,.15);color:var(--yellow)}
.dup-item button{background:var(--red);border:none;color:white;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.dup-empty{font-size:11px;color:var(--text3);text-align:center;padding:12px 0}
.dup-clean-btn{padding:6px 14px;border-radius:6px;background:var(--red);border:none;color:white;font-weight:600;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px;width:100%}
.dup-clean-btn:hover{background:#dc2626}
.dup-clean-btn:disabled{opacity:.5;cursor:not-allowed}

/* Toast */
.toast{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;
    transition:opacity .3s;z-index:300;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}

@media(max-width:480px){
    .app{padding:6px}
    .card{padding:14px 12px;border-radius:10px}
    .modal{padding:16px;width:95%}
}
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>
<div class="app">
<div class="card">

  <!-- Header -->
  <div class="header">
    <img src="/static/Png/Israel.png" alt="Logo">
    <div class="header-info">
      <h1>Radio IsraProyets</h1>
      <p id="song-count-label">0 canciones</p>
    </div>
    <div class="header-actions">
      <button id="settings-btn" title="Configuración">⚙️</button>
    </div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer"><canvas id="vizCanvas"></canvas></div>

  <!-- Now Playing -->
  <div class="now-playing">
    <div class="title" id="now-title">Presiona reproducir</div>
    <div class="artist" id="now-artist">Radio IsraProyets</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="prev" title="Anterior">⏮</button>
    <button class="btn-play" id="play" title="Reproducir">▶</button>
    <button id="next" title="Siguiente">⏭</button>
  </div>

  <!-- Progress -->
  <div class="progress-container">
    <span id="cur-time">0:00</span>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="tot-time">0:00</span>
  </div>

  <!-- Volume -->
  <div class="volume-row">
    <span class="vol-icon" id="vol-icon">🔊</span>
    <input type="range" id="vol-slider" min="0" max="100" value="70">
    <span class="vol-pct" id="vol-pct">70%</span>
  </div>

  <!-- Song list (collapsible) -->
  <div class="song-section">
    <div class="song-toggle" id="song-toggle">
      <h2>Lista de canciones</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="count" id="list-count">0</span>
        <span class="arrow">▼</span>
      </div>
    </div>
    <div class="song-body" id="song-body">
      <input class="search-box" id="search" type="text" placeholder="Buscar...">
      <ul class="song-list" id="song-list"></ul>
    </div>
  </div>

  <!-- Download -->
  <div class="download-area">
    <div class="download-row">
      <input id="dl-url" type="url" placeholder="URL de YouTube...">
      <button id="dl-btn">+</button>
    </div>
    <ul class="download-tasks" id="dl-tasks"></ul>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/IsraelDXPP" target="_blank">IsraProyets</a>
    <span class="sep">·</span>
    <a href="https://github.com/IsraelDXPP/Radio-IsraelProyets" target="_blank">GitHub</a>
    <span class="sep">·</span>
    <a href="https://github.com/IsraelDXPP/Radio-IsraelProyets/blob/main/LICENSE" target="_blank">GPL-3.0</a>
  </div>
</div>
</div>

<!-- ⚙️ Settings Modal -->
<div class="modal-overlay" id="settings-modal">
<div class="modal">
  <button class="close-btn" id="settings-close">✕</button>
  <h2>⚙️ Configuración</h2>

  <!-- Apariencia -->
  <div class="modal-section">
    <h3>Apariencia</h3>
    <div class="setting-row">
      <label>Tema</label>
      <select id="set-theme"><option value="dark">Oscuro</option><option value="light">Claro</option></select>
    </div>
    <div class="setting-row">
      <label>Color fondo 1</label>
      <div class="color-group">
        <input type="color" id="set-color1">
        <input type="text" id="set-color1txt">
      </div>
    </div>
    <div class="setting-row">
      <label>Color fondo 2</label>
      <div class="color-group">
        <input type="color" id="set-color2">
        <input type="text" id="set-color2txt">
      </div>
    </div>
    <div class="presets" id="set-presets"></div>
  </div>

  <!-- Visualizador -->
  <div class="modal-section">
    <h3>Visualizador</h3>
    <div class="setting-row">
      <label>Estilo<button style="margin-left:6px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text3)" id="viz-refresh">🔄</button></label>
    </div>
    <div class="viz-styles" id="viz-styles">
      <button data-style="bars">Barras</button>
      <button data-style="wave">Onda</button>
      <button data-style="circle">Círculo</button>
      <button data-style="rings">Anillos</button>
      <button data-style="fire">Fuego</button>
    </div>
    <div class="setting-row" style="margin-top:8px">
      <label>Color del viz</label>
      <div class="color-group">
        <input type="color" id="set-vizcolor" value="#a855f7">
        <input type="text" id="set-vizcolortxt">
      </div>
    </div>
    <div class="setting-row">
      <label>Sensibilidad</label>
      <select id="set-sensitivity">
        <option value="0.5">Baja</option>
        <option value="1" selected>Normal</option>
        <option value="2">Alta</option>
        <option value="3">Muy alta</option>
      </select>
    </div>
  </div>

  <!-- Audio -->
  <div class="modal-section">
    <h3>Audio</h3>
    <div class="setting-row">
      <label>Modo audio</label>
      <select id="set-audio-mode">
        <option value="stereo">Estéreo</option>
        <option value="mono">Mono</option>
        <option value="wide">Wide</option>
      </select>
    </div>
  </div>

  <!-- Canciones duplicadas -->
  <div class="modal-section">
    <h3>Duplicados</h3>
    <div id="dup-list"></div>
    <button class="dup-clean-btn" id="dup-clean">Eliminar todos los duplicados</button>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────
const S = {
  songs: [], filtered: [], currentIdx: -1, playing: false,
  volume: +localStorage.getItem('radio-vol') || 0.7,
  theme: localStorage.getItem('radio-theme') || 'dark',
  c1: localStorage.getItem('radio-c1') || '#7c3aed',
  c2: localStorage.getItem('radio-c2') || '#a855f7',
  vizStyle: localStorage.getItem('radio-viz') || 'bars',
  vizColor: localStorage.getItem('radio-vizcolor') || '#a855f7',
  vizSens: +localStorage.getItem('radio-sens') || 1,
  audioMode: localStorage.getItem('radio-mode') || 'stereo',
};

const audio = new Audio();
const $ = id => document.getElementById(id);
const $$ = (s, p) => (p||document).querySelector(s);

// ── Toast ──────────────────────────────────────
function toast(m) { const e=$('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(e._h); e._h=setTimeout(()=>e.classList.remove('show'),2500); }

// ── Load songs ─────────────────────────────────
async function loadSongs() {
  try {
    const r = await fetch('/api/songs');
    S.songs = await r.json();
    S.filtered = [...S.songs];
    updateUI();
    if (!S.songs.length) $('now-title').textContent = 'No hay canciones';
    else if (S.currentIdx < 0) $('now-title').textContent = S.songs[0].name;
  } catch { toast('Error al cargar'); }
}

function updateUI() {
  const total = S.songs.length, shown = S.filtered.length;
  $('list-count').textContent = total;
  $('song-count-label').textContent = `${total} canción${total!==1?'es':''}`;
  renderList();
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Song list ──────────────────────────────────
function renderList() {
  const q = $('search').value.toLowerCase();
  S.filtered = q ? S.songs.filter(s => s.name.toLowerCase().includes(q)) : [...S.songs];
  if (!S.filtered.length) {
    $('song-list').innerHTML = `<li class="song-list-empty">${q?'Sin resultados':'Vacía'}</li>`;
    updateUI(); return;
  }
  $('song-list').innerHTML = S.filtered.map((s,i) =>
    `<li class="song-item${S.currentIdx>=0 && S.songs[S.currentIdx]?.id===s.id?' active':''}"
         data-idx="${i}">
      <span class="num">${i+1}</span>
      <div class="info">
        <div class="name">${esc(s.name)}</div>
        <div class="meta">${(s.size/1024/1024).toFixed(1)} MB</div>
      </div>
      ${s.from_yt ? '<span class="tag yt">YT</span>' : '<span class="tag local">LOCAL</span>'}
    </li>`
  ).join('');
  updateUI();
}

// ── Play ───────────────────────────────────────
function playSong(idx) {
  const songs = S.filtered;
  if (idx < 0 || idx >= songs.length) return;
  const real = S.songs.findIndex(s => s.id === songs[idx].id);
  if (real < 0) return;
  S.currentIdx = real;
  const song = S.songs[real];
  audio.src = '/stream/' + song.id;
  audio.volume = S.volume;
  audio.play().catch(()=>{});
  S.playing = true;
  $('play').textContent = '⏸';
  $('now-title').textContent = song.name;
  renderList();
}

$('song-list').addEventListener('click', e => {
  const item = e.target.closest('.song-item');
  if (item) playSong(+item.dataset.idx);
});

// ── Collapsible song list ──────────────────────
let songOpen = localStorage.getItem('radio-song-open') !== '0';
function toggleSongList() {
  songOpen = !songOpen;
  localStorage.setItem('radio-song-open', songOpen ? '1' : '0');
  $('song-toggle').classList.toggle('open', songOpen);
  $('song-body').classList.toggle('open', songOpen);
}
$('song-toggle').addEventListener('click', toggleSongList);
$('song-toggle').classList.toggle('open', songOpen);
$('song-body').classList.toggle('open', songOpen);
$('search').addEventListener('input', renderList);

// ── Controls ──────────────────────────────────
$('play').addEventListener('click', () => {
  if (S.currentIdx < 0 && S.songs.length) { playSong(0); return; }
  S.playing ? audio.pause() : audio.play().catch(()=>{});
});
$('next').addEventListener('click', () => { if (!S.songs.length) return; playSong((S.currentIdx+1)%S.songs.length); });
$('prev').addEventListener('click', () => { if (!S.songs.length) return; playSong((S.currentIdx-1+S.songs.length)%S.songs.length); });

audio.addEventListener('play', () => { S.playing=true; $('play').textContent='⏸'; initAudioCtx(); });
audio.addEventListener('pause', () => { S.playing=false; $('play').textContent='▶'; });
audio.addEventListener('ended', () => { $('next').click(); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  $('progress-fill').style.width = (audio.currentTime/audio.duration*100)+'%';
  $('cur-time').textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => { $('tot-time').textContent = fmt(audio.duration); });

function fmt(s) { if (!s||isNaN(s)) return '0:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

$('progress-bar').addEventListener('click', e => {
  if (!audio.duration) return;
  audio.currentTime = ((e.clientX-$('progress-bar').getBoundingClientRect().left)/$('progress-bar').offsetWidth) * audio.duration;
});

// ── Volume ─────────────────────────────────────
$('vol-slider').addEventListener('input', () => {
  S.volume = $('vol-slider').value/100;
  audio.volume = S.volume;
  $('vol-pct').textContent = Math.round(S.volume*100)+'%';
  $('vol-icon').textContent = S.volume===0?'🔇':S.volume<0.5?'🔉':'🔊';
  localStorage.setItem('radio-vol', S.volume);
});
$('vol-icon').addEventListener('click', () => {
  if (S.volume > 0) { S._pv = S.volume; $('vol-slider').value=0; S.volume=0; audio.volume=0; $('vol-pct').textContent='0%'; $('vol-icon').textContent='🔇'; }
  else { const r=S._pv||.7; $('vol-slider').value=r*100; S.volume=r; audio.volume=r; $('vol-pct').textContent=Math.round(r*100)+'%'; $('vol-icon').textContent=r<.5?'🔉':'🔊'; }
});

// ── Audio Context (lazy, single creation) ──────
let actx = null, srcNode = null, analyser = null;
let vizRunning = false, vizId = null;

function initAudioCtx() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  actx = new (window.AudioContext||window.webkitAudioContext)();
  srcNode = actx.createMediaElementSource(audio);
  analyser = actx.createAnalyser();
  analyser.fftSize = 128;
  applyAudioMode(S.audioMode);
  startViz();
}

// ── Audio Mode ─────────────────────────────────
function applyAudioMode(mode) {
  if (!actx || !srcNode || !analyser) return;
  try { srcNode.disconnect(); } catch {}
  try { analyser.disconnect(); } catch {}

  if (mode === 'stereo') {
    srcNode.connect(analyser);
    analyser.connect(actx.destination);
  } else if (mode === 'mono') {
    const split = actx.createChannelSplitter(2);
    const merge = actx.createChannelMerger(1);
    srcNode.connect(split);
    split.connect(merge,0,0); split.connect(merge,1,0);
    merge.connect(analyser);
    analyser.connect(actx.destination);
  } else if (mode === 'wide') {
    const split = actx.createChannelSplitter(2);
    const merge = actx.createChannelMerger(2);
    const delay = actx.createDelay(0.02);
    delay.delayTime.value = 0.012;
    const g = actx.createGain(); g.gain.value = 0.5;
    srcNode.connect(split);
    split.connect(merge,0,0);
    split.connect(delay,1); delay.connect(g); g.connect(merge,0,1);
    merge.connect(analyser);
    analyser.connect(actx.destination);
  }
}

// ── Visualizer ────────────────────────────────
const canvas = $('vizCanvas'), vctx = canvas.getContext('2d');

function startViz() {
  if (vizRunning || !analyser) return;
  vizRunning = true;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*2; canvas.height = h*2;
  vctx.scale(2,2);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    vizId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    vctx.clearRect(0,0,w,h);

    const style = S.vizStyle;
    const color = S.vizColor;
    const sens = S.vizSens;
    const bw = w/data.length*2.5, gap = w/data.length*0.4;

    if (style === 'bars') {
      for (let i=0; i<data.length; i++) {
        const pct = Math.min(1, (data[i]/255)*sens);
        const bh = Math.max(2, pct*h*0.85);
        const x = i*(bw+gap)+gap/2, y = h-bh;
        const grd = vctx.createLinearGradient(x,y,x,h);
        grd.addColorStop(0, color); grd.addColorStop(1, S.c1);
        vctx.fillStyle = grd;
        vctx.beginPath(); vctx.roundRect(x,y,bw,bh,[2,2,0,0]); vctx.fill();
      }
    } else if (style === 'wave') {
      vctx.beginPath();
      for (let i=0; i<data.length; i++) {
        const pct = (data[i]/255)*sens;
        const x = (i/data.length)*w, y = h/2 - pct*(h*0.4);
        i===0 ? vctx.moveTo(x,y) : vctx.lineTo(x,y);
      }
      for (let i=data.length-1; i>=0; i--) {
        const pct = (data[i]/255)*sens;
        const x = (i/data.length)*w, y = h/2 + pct*(h*0.4);
        vctx.lineTo(x,y);
      }
      vctx.closePath();
      const grd = vctx.createLinearGradient(0,0,0,h);
      grd.addColorStop(0, color); grd.addColorStop(1, 'transparent');
      vctx.fillStyle = grd; vctx.fill();
      vctx.strokeStyle = color; vctx.lineWidth = 1.5; vctx.stroke();
    } else if (style === 'circle') {
      const cx = w/2, cy = h/2, r = Math.min(w,h)*0.3;
      for (let i=0; i<data.length; i++) {
        const pct = (data[i]/255)*sens;
        const angle = (i/data.length)*Math.PI*2 - Math.PI/2;
        const len = r + pct*r*0.6;
        const x = cx + Math.cos(angle)*len, y = cy + Math.sin(angle)*len;
        vctx.fillStyle = color; vctx.globalAlpha = 0.6 + pct*0.4;
        vctx.beginPath(); vctx.arc(x,y,2+pct*3,0,Math.PI*2); vctx.fill();
      }
      vctx.globalAlpha = 1;
    } else if (style === 'rings') {
      for (let ring=0; ring<3; ring++) {
        const cx = w/2, cy = h/2, br = Math.min(w,h)*0.15*(ring+1);
        vctx.beginPath();
        for (let i=0; i<data.length; i++) {
          const pct = (data[i]/255)*sens;
          const angle = (i/data.length)*Math.PI*2 - Math.PI/2;
          const len = br + pct*20;
          const x = cx + Math.cos(angle)*len, y = cy + Math.sin(angle)*len;
          i===0 ? vctx.moveTo(x,y) : vctx.lineTo(x,y);
        }
        vctx.closePath();
        vctx.strokeStyle = color; vctx.lineWidth = 1.5 + ring;
        vctx.globalAlpha = 0.4 + ring*0.2;
        vctx.stroke();
      }
      vctx.globalAlpha = 1;
    } else if (style === 'fire') {
      for (let i=0; i<data.length; i++) {
        const pct = Math.min(1,(data[i]/255)*sens);
        const bh = pct*h*0.9;
        const x = (i/data.length)*w, y = h - bh;
        const grad = vctx.createRadialGradient(x,y+bh/2,2,x,y+bh/2,bh);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, color);
        grad.addColorStop(0.6, S.c2); grad.addColorStop(1, 'transparent');
        vctx.fillStyle = grad;
        vctx.beginPath(); vctx.arc(x,y+bh/2,bh/2,0,Math.PI*2); vctx.fill();
      }
    }
  }
  draw();
}

function stopViz() { vizRunning = false; if (vizId) cancelAnimationFrame(vizId); vizId = null; vctx.clearRect(0,0,canvas.width,canvas.height); }

// ── Settings Modal ─────────────────────────────
$('settings-btn').addEventListener('click', () => {
  $('settings-modal').classList.add('show');
  loadDupes();
  // Sync settings UI
  $('set-theme').value = S.theme;
  $('set-color1').value = S.c1; $('set-color1txt').value = S.c1;
  $('set-color2').value = S.c2; $('set-color2txt').value = S.c2;
  $('set-audio-mode').value = S.audioMode;
  $('set-vizcolor').value = S.vizColor; $('set-vizcolortxt').value = S.vizColor;
  $('set-sensitivity').value = String(S.vizSens);
  $$('.viz-styles button.active')?.classList.remove('active');
  $$(`.viz-styles button[data-style="${S.vizStyle}"]`)?.classList.add('active');
  renderPresets();
});

$('settings-close').addEventListener('click', () => $('settings-modal').classList.remove('show'));
$('settings-modal').addEventListener('click', e => { if (e.target === $('settings-modal')) $('settings-modal').classList.remove('show'); });

// Theme
$('set-theme').addEventListener('change', () => {
  S.theme = $('set-theme').value;
  document.documentElement.setAttribute('data-theme', S.theme);
  localStorage.setItem('radio-theme', S.theme);
});

// Colors
function applyColors(c1,c2) { S.c1=c1; S.c2=c2; document.documentElement.style.setProperty('--gc1',c1); document.documentElement.style.setProperty('--gc2',c2); localStorage.setItem('radio-c1',c1); localStorage.setItem('radio-c2',c2); }

$('set-color1').addEventListener('input', ()=>{ $('set-color1txt').value=$('set-color1').value; applyColors($('set-color1').value, S.c2); renderPresets(); });
$('set-color2').addEventListener('input', ()=>{ $('set-color2txt').value=$('set-color2').value; applyColors(S.c1, $('set-color2').value); renderPresets(); });
$('set-color1txt').addEventListener('change', ()=>{ $('set-color1').value=$('set-color1txt').value; applyColors($('set-color1txt').value, S.c2); renderPresets(); });
$('set-color2txt').addEventListener('change', ()=>{ $('set-color2').value=$('set-color2txt').value; applyColors(S.c1, $('set-color2txt').value); renderPresets(); });

const PRESETS = [['#7c3aed','#a855f7'],['#ec4899','#f43f5e'],['#06b6d4','#3b82f6'],['#22c55e','#10b981'],['#f59e0b','#ef4444'],['#8b5cf6','#ec4899'],['#0ea5e9','#a855f7'],['#10b981','#06b6d4']];
function renderPresets() {
  $('set-presets').innerHTML = PRESETS.map(([c1,c2]) =>
    `<button style="background:linear-gradient(135deg,${c1},${c2})" data-c1="${c1}" data-c2="${c2}" class="${c1===S.c1&&c2===S.c2?'active':''}"></button>`
  ).join('');
  $('set-presets').querySelectorAll('button').forEach(b => b.addEventListener('click', ()=>{
    applyColors(b.dataset.c1,b.dataset.c2); $('set-color1').value=b.dataset.c1; $('set-color1txt').value=b.dataset.c1; $('set-color2').value=b.dataset.c2; $('set-color2txt').value=b.dataset.c2; renderPresets();
  }));
}
applyColors(S.c1,S.c2);
$('set-color1').value = S.c1; $('set-color1txt').value = S.c1;
$('set-color2').value = S.c2; $('set-color2txt').value = S.c2;

// Visualizer styles
$('viz-styles').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  $$('.viz-styles button.active')?.classList.remove('active');
  btn.classList.add('active');
  S.vizStyle = btn.dataset.style;
  localStorage.setItem('radio-viz', S.vizStyle);
});

// Viz color
$('set-vizcolor').addEventListener('input', ()=>{ $('set-vizcolortxt').value=$('set-vizcolor').value; S.vizColor=$('set-vizcolor').value; localStorage.setItem('radio-vizcolor',S.vizColor); });
$('set-vizcolortxt').addEventListener('change', ()=>{ $('set-vizcolor').value=$('set-vizcolortxt').value; S.vizColor=$('set-vizcolortxt').value; localStorage.setItem('radio-vizcolor',S.vizColor); });

// Sensitivity
$('set-sensitivity').addEventListener('change', () => { S.vizSens = +$('set-sensitivity').value; localStorage.setItem('radio-sens', S.vizSens); });

// Viz refresh button
$('viz-refresh').addEventListener('click', () => { stopViz(); startViz(); });

// Audio mode
$('set-audio-mode').addEventListener('change', () => {
  S.audioMode = $('set-audio-mode').value;
  localStorage.setItem('radio-mode', S.audioMode);
  applyAudioMode(S.audioMode);
});

// ── Duplicates ──────────────────────────────
async function loadDupes() {
  try {
    const r = await fetch('/api/duplicates');
    const groups = await r.json();
    const el = $('dup-list');
    if (!groups.length) { el.innerHTML = '<div class="dup-empty">✓ Sin duplicados</div>'; $('dup-clean').style.display='none'; return; }
    $('dup-clean').style.display='block';
    let html = `<div class="dup-empty">${groups.length} grupo(s) de duplicados</div>`;
    for (const g of groups) {
      html += '<div style="margin-bottom:6px">';
      html += `<div class="dup-item"><span class="dup-name"><b>${esc(g.original.name)}</b></span><span class="dup-badge sha">ORIGINAL</span></div>`;
      for (const d of [...(g.sha_matches||[]), ...(g.name_matches||[])]) {
        const type = g.sha_matches?.includes(d) ? 'sha' : 'name';
        html += `<div class="dup-item">
          <span class="dup-name">${esc(d.name)}</span>
          <span class="dup-badge ${type}">${type==='sha'?'SHA':'NOMBRE'}</span>
          <button onclick="deleteDup('${d.id}')">✕</button>
        </div>`;
      }
      html += '</div>';
    }
    el.innerHTML = html;
  } catch { $('dup-list').innerHTML = '<div class="dup-empty">Error al cargar</div>'; }
}

async function deleteDup(id) {
  try { await fetch('/api/duplicates/'+id, {method:'DELETE'}); loadDupes(); loadSongs(); toast('Eliminado'); } catch { toast('Error'); }
}

$('dup-clean').addEventListener('click', async () => {
  $('dup-clean').disabled = true; $('dup-clean').textContent = 'Eliminando...';
  try {
    const r = await fetch('/api/duplicates/clean', {method:'POST'});
    const d = await r.json();
    toast(d.removed + ' duplicados eliminados');
    loadDupes(); loadSongs();
  } catch { toast('Error'); }
  $('dup-clean').disabled = false; $('dup-clean').textContent = 'Eliminar todos los duplicados';
});

// ── Download ────────────────────────────────
$('dl-btn').addEventListener('click', startDL);
$('dl-url').addEventListener('keydown', e => { if (e.key==='Enter') startDL(); });

async function startDL() {
  const url = $('dl-url').value.trim();
  if (!url) return toast('Ingresa URL');
  $('dl-btn').disabled = true; $('dl-btn').textContent = '...';
  try {
    const r = await fetch('/api/download', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    if (!r.ok) { const e = await r.json(); return toast(e.error||'Error'); }
    const d = await r.json();
    $('dl-url').value = '';
    toast('Descargando');
    pollDL(d.task_id);
  } catch { toast('Error'); }
  finally { $('dl-btn').disabled = false; $('dl-btn').textContent = '+'; }
}

const DL_POLL = 2000;
const dlPollers = {};

function pollDL(tid) {
  const li = document.createElement('li');
  li.className = 'download-task'; li.id = 'dl-'+tid;
  li.innerHTML = `<span class="dot queued" id="ds-${tid}"></span><span class="name" id="dn-${tid}">Esperando...</span><div class="bar"><div class="bar-fill" id="db-${tid}"></div></div><span class="pct" id="dp-${tid}">0%</span>`;
  $('dl-tasks').prepend(li);
  dlPollers[tid] = setInterval(async () => {
    try {
      const r = await fetch('/api/download/'+tid);
      if (!r.ok) { stopDL(tid); return; }
      const t = await r.json();
      const se = $('ds-'+tid), ne = $('dn-'+tid), be = $('db-'+tid), pe = $('dp-'+tid);
      if (!se) { stopDL(tid); return; }
      se.className = 'dot '+t.status;
      const pct = Math.round((t.progress||0)*100);
      if (be) be.style.width = pct+'%';
      if (pe) pe.textContent = pct+'%';
      if (t.title && ne) ne.textContent = t.title;
      if (t.status === 'done') { if (ne) ne.textContent = t.title||'Listo'; if (pe) pe.textContent='100%'; stopDL(tid); toast('Descarga completa'); loadSongs(); }
      else if (t.status === 'error') { if (ne) ne.textContent = t.error||'Error'; stopDL(tid); toast('Error'); }
    } catch { stopDL(tid); }
  }, DL_POLL);
}
function stopDL(tid) { clearInterval(dlPollers[tid]); delete dlPollers[tid]; }

// ── Init ────────────────────────────────────
loadSongs();
</script>
</body>
</html>
